services:
  etl:
    build:
      context: .
      dockerfile: etl-docker-project/Dockerfile
    container_name: etl-pipeline
    env_file:
      - ./.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - RAW_MOBILITY_DIR=./data/raw/mobility_gtfs
      - RAW_BACKONTRACK_DIR=./data/raw/backontrack_csv
      - RAW_AIRPORTS_DIR=./data/raw/airports
      - OUTPUT_DIR=./data/staging
      - OUTPUT_AIRPORTS_FILE=staging_airports.csv
      - OUTPUT_INTERMODAL_FILE=staging_intermodal.csv
      - OUTPUT_FINAL_FILE=final_routes.csv
      - INCREMENTAL_LOAD=${INCREMENTAL_LOAD}
      - TARGET_COUNTRIES=${TARGET_COUNTRIES}
    volumes:
      - /Volumes/Optima/MSPR_DATA/raw:/app/data/raw
      - /Volumes/Optima/MSPR_DATA/staging:/app/data/staging
      - ./extraction:/app/extraction
      - ./transformation:/app/transformation
      - ./load:/app/load
      - ./database:/app/database
      - ./analyse:/app/analyse
      - ./visualization:/app/visualization
      - ./requirements.txt:/app/requirements.txt
      - ./main.py:/app/main.py
    command: ["python", "main.py"]
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: etl-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  dashboard-web:
    build:
      context: .
      dockerfile: etl-docker-project/Dockerfile
    container_name: dashboard-web
    env_file:
      - ./.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "8505:8505"
    volumes:
      - ./visualization:/app/visualization
      - ./requirements.txt:/app/requirements.txt
    command:
      [
        "streamlit",
        "run",
        "visualization/dashboard_web.py",
        "--server.port=8505",
        "--server.address=0.0.0.0",
      ]
    depends_on:
      - db
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: mspr_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_MAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    ports:
      - "5050:80"
    depends_on:
      - db
